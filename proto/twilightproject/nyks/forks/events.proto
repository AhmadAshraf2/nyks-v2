syntax = "proto3";
package twilightproject.nyks.forks;

option go_package = "twilight-project/nyks/x/forks/types";

message EventSetDelegateAddresses {
  string message = 1;
  string address = 2;
}

message EventProposal {
  string message        = 1;
  string proposal_hash  = 2;
  string attestation_id = 3;
}

message EventObservation {
  string attestation_type = 1;
  string attestation_id   = 2;
}
