syntax = "proto3";

package twilightproject.nyks.zkos;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "twilightproject/nyks/zkos/params.proto";

option go_package = "twilight-project/nyks/x/zkos/types";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  rpc TransferTx(MsgTransferTx) returns (MsgTransferTxResponse);
  rpc MintBurnTradingBtc(MsgMintBurnTradingBtc) returns (MsgMintBurnTradingBtcResponse);
}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "nyks/x/zkos/MsgUpdateParams";
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}
message MsgUpdateParamsResponse {}

message MsgTransferTx {
  option (cosmos.msg.v1.signer) = "zkOracleAddress";
  string txId            = 1;
  string txByteCode      = 2;
  uint64 txFee           = 3;
  string zkOracleAddress = 4;
}
message MsgTransferTxResponse {}

message MsgMintBurnTradingBtc {
  option (cosmos.msg.v1.signer) = "twilightAddress";
  bool   mintOrBurn      = 1;
  uint64 btcValue        = 2;
  string qqAccount       = 3;
  string encryptScalar   = 4;
  string twilightAddress = 5;
}
message MsgMintBurnTradingBtcResponse {}
